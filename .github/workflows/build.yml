name: Android CI — Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle 8.7
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'
          cache-read-only: false

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Build debug APK
        run: gradle assembleDebug

      - name: Rename APK
        run: |
          mkdir -p artifacts
          cp app/build/outputs/apk/debug/app-debug.apk \
             artifacts/cfg-pos-debug-${{ github.run_number }}.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CFG-POS-debug-${{ github.run_number }}
          path: artifacts/cfg-pos-debug-${{ github.run_number }}.apk
          retention-days: 30

      - name: Build summary
        if: success()
        run: |
          echo "## ✅ APK généré" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Fichier :** \`cfg-pos-debug-${{ github.run_number }}.apk\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Téléchargement :** onglet *Actions* → ce run → section *Artifacts*" >> $GITHUB_STEP_SUMMARY
          APK_SIZE=$(du -sh app/build/outputs/apk/debug/app-debug.apk | cut -f1)
          echo "**Taille :** ${APK_SIZE}" >> $GITHUB_STEP_SUMMARY
